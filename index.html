const STYLE_ID = "yuika-app-styles";

  style.textContent = `
    @keyframes slashIn {
      0% { transform: rotate(-30deg) scaleX(0); opacity: 1; }
      50% { transform: rotate(-30deg) scaleX(1.2); opacity: 1; }
      100% { transform: rotate(-30deg) scaleX(0); opacity: 0; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      30% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10px); }

      0% { opacity: 0; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// --- TITLE SYSTEM (恋の呼吸) ---
const KATA_NAMES = ["壱ノ型","弐ノ型","参ノ型","肆ノ型","伍ノ型","陸ノ型","漆ノ型","捌ノ型","玖ノ型","拾ノ型"];
function getTitle(correct, total, dunno) {
  const rate = total > 0 ? correct / total : 0;
  if (correct === total && dunno === 0) return { label:"恋柱", icon:"💖", color:T.gold, msg:"全問正解！恋の呼吸、極めたり！" };
  if (rate >= 0.8) return { label:"甲", icon:"🌸", color:T.pink, msg:"見事！もう少しで恋柱！" };
  if (rate >= 0.6) return { label:"丙", icon:"🎀", color:T.pinkPale, msg:"いい調子！" };
  return { label:"修行中", icon:"📖", color:T.textDim, msg:"次こそ！恋は何度でも挑戦できる！" };
}

// --- SESSION HISTORY ---
async function saveSession(session) {
  try {
    let sessions = [];
    try {
      const r = await window.storage.get("sessions");
      if (r && r.value) sessions = JSON.parse(r.value);
    } catch(e) {}
    sessions.unshift(session);
    if (sessions.length > 100) sessions = sessions.slice(0, 100);
    await window.storage.set("sessions", JSON.stringify(sessions));
  } catch(e) { console.error("Save session error:", e); }
}

async function loadSessions() {
  try {
    const r = await window.storage.get("sessions");
    if (r && r.value) return JSON.parse(r.value);
  } catch(e) {}
  return [];
}

function calcStats(sessions) {
  if (!sessions.length) return { streak: 0, avgRate: 0, bestTitle: "修行中", totalSessions: 0 };
  const today = new Date(); today.setHours(0,0,0,0);
  let streak = 0;
  const daySet = new Set(sessions.map(s => { const d = new Date(s.ts); d.setHours(0,0,0,0); return d.getTime(); }));
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (daySet.has(d.getTime())) streak++; else break;
  }
  const rates = sessions.filter(s=>s.total>0).map(s=>s.correct/s.total);
  const avgRate = rates.length ? Math.round(rates.reduce((a,b)=>a+b,0)/rates.length*100) : 0;
  const titles = ["恋柱","甲","丙","修行中"];
  let bestIdx = 3;
  sessions.forEach(s => {
    const t = getTitle(s.correct, s.total, s.dunno || 0);
    const ti = titles.indexOf(t.label);
    if (ti >= 0 && ti < bestIdx) bestIdx = ti;
  });
  return { streak, avgRate, bestTitle: titles[bestIdx], totalSessions: sessions.length };
}

// --- UNLOCK / CLEAR TRACKING ---
async function loadCleared() {
  try { const r = await window.storage.get("cleared"); if (r && r.value) return JSON.parse(r.value); } catch(e) {}
  return {};
}
async function saveClear(unitId, mode, score, total) {
  try {
    let cleared = {};
    try { const r = await window.storage.get("cleared"); if (r && r.value) cleared = JSON.parse(r.value); } catch(e) {}
    const key = unitId + "_" + mode;
    const rate = total > 0 ? score / total : 0;
    const prev = cleared[key];
    if (!prev || rate > prev.rate) {
      cleared[key] = { rate, score, total, ts: new Date().toISOString() };
    }
    await window.storage.set("cleared", JSON.stringify(cleared));
    return cleared;
  } catch(e) { console.error("Save clear error:", e); return {}; }
}

  const check = () => { setDone(true); onAnswer(items.every((v,i)=>v===q.correctOrder[i])?"correct":"wrong"); };

function QuizScreen({ unit, onBack, email, onSessionSaved }) {
  const [idx, setIdx] = useState(0);
  const [results, setResults] = useState([]);
  const [showExp, setShowExp] = useState(false);
  const [done, setDone] = useState(false);
  const [streak, setStreak] = useState(0);
  const [showSlash, setShowSlash] = useState(false);
  const [emailSent, setEmailSent] = useState(false);
  const [saved, setSaved] = useState(false);
  const [qStart, setQStart] = useState(Date.now());
  const [sessionStart] = useState(Date.now());
  const topRef = useRef(null);

  const qs = unit.quizQuestions;
  const q = qs[idx];
  const cc = results.filter(r=>r.result==="correct").length;
  const wc = results.filter(r=>r.result==="wrong").length;
  const dc = results.filter(r=>r.result==="dunno").length;
  const totalSec = results.reduce((s,r)=>s+(r.sec||0),0);
  const avgSec = results.length>0?Math.round(totalSec/results.length):0;

  const fmtTime = (sec) => {
    if (sec < 60) return `${sec}秒`;
    return `${Math.floor(sec/60)}分${sec%60}秒`;
  };

  const handleAnswer = (result) => {
    const sec = Math.round((Date.now()-qStart)/1000);
    setResults(p=>[...p,{id:q.id,result,sec}]);
    if (result==="correct") {
      const newStreak = streak + 1;
      setStreak(newStreak);
      setShowSlash(true);
      setTimeout(()=>setShowSlash(false), 1200);
    } else { setStreak(0); }
    setShowExp(true);
  };

  const next = () => {
    if (idx+1>=qs.length) { setDone(true); }
    else { setIdx(i=>i+1); setShowExp(false); setQStart(Date.now()); }
    topRef.current?.scrollIntoView({behavior:"smooth"});
  };

  useEffect(() => {
    if (done && !saved) {
      setSaved(true);
      const t = getTitle(cc, qs.length, dc);
      saveSession({
        ts: new Date().toISOString(), mode: "quiz",
        subject: unit.subject, unit: unit.name,
        correct: cc, wrong: wc, dunno: dc, total: qs.length,
        title: t.label, retry: 0, totalSec, avgSec,
      }).then(() => { if (onSessionSaved) onSessionSaved(); });
      saveClear(unit.id, "quiz", cc, qs.length);
    }
  }, [done]);

  const title = getTitle(cc, qs.length, dc);
  const lastR = results.length>0?results[results.length-1]?.result:null;
  const honestBadge = dc > 0;

  const sendEmail = () => {
    if (!email) return;
    const wrongList = results.map((r,i)=>r.result==="wrong"?`  ❌ Q${i+1}: ${qs[i].category}（${r.sec}秒）`:null).filter(Boolean).join("\n");
    const dunnoList = results.map((r,i)=>r.result==="dunno"?`  🤔 Q${i+1}: ${qs[i].category}（${r.sec}秒）`:null).filter(Boolean).join("\n");
    const slowList = results.filter(r=>r.sec>=60).map((r,i)=>results.indexOf(r)).map(i=>`  ⏱ Q${i+1}: ${qs[i].category} ${results[i].sec}秒`).join("\n");
    const body = `📅 ${new Date().toLocaleDateString("ja-JP")}\n📚 ${unit.subject} ＞ ${unit.name}\n\n${title.icon} 称号: ${title.label}\n\n⭕ 正解: ${cc}問\n❌ まちがい: ${wc}問\n🤔 わからない: ${dc}問\n\n⏱ 合計: ${fmtTime(totalSec)} / 平均: ${fmtTime(avgSec)}1問\n\n${wrongList?`❌まちがえた問題:\n${wrongList}\n`:""}\n${dunnoList?`🤔わからなかった問題:\n${dunnoList}\n`:""}${slowList?`\n⏱ 時間がかかった問題（60秒以上）:\n${slowList}\n`:""}`;
    const subj = encodeURIComponent(`[ゆいか学習] ${title.icon}${title.label} ${unit.subject}・${unit.name}`);
    window.open(`mailto:${encodeURIComponent(email)}?subject=${subj}&body=${encodeURIComponent(body)}`);
    setEmailSent(true);
  };

  if (done) {
    return (<Wrapper><div ref={topRef}/>
      <div style={{...cardBase,textAlign:"center",padding:"40px 20px",position:"relative"}} className="sakura-bg">
        {cc===qs.length&&dc===0 && <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at center, ${T.gold}22 0%, transparent 60%)`,pointerEvents:"none"}}/>}
        <div style={{fontSize:64,marginBottom:8}}>{title.icon}</div>
        <h2 style={{fontSize:28,fontWeight:900,margin:"8px 0",color:title.color,fontFamily:"'Zen Maru Gothic',sans-serif",textShadow:title.color===T.gold?`0 0 20px ${T.gold}66`:"none"}}>{title.label}</h2>
        <p style={{fontSize:15,color:T.textDim,margin:"4px 0 20px"}}>{title.msg}</p>
        {honestBadge && <div style={{display:"inline-block",background:`${T.pinkLight}22`,border:`1px solid ${T.pinkLight}`,borderRadius:20,padding:"6px 16px",fontSize:13,color:T.pinkLight,fontWeight:700,marginBottom:16}}>🌸 正直者の呼吸</div>}
        <div style={{display:"flex",justifyContent:"center",gap:16,margin:"20px 0"}}>
          <div><div style={{fontSize:32,fontWeight:900,color:T.correct}}>{cc}</div><div style={{fontSize:11,color:T.textDim}}>⭕正解</div></div>
          <div><div style={{fontSize:32,fontWeight:900,color:T.wrong}}>{wc}</div><div style={{fontSize:11,color:T.textDim}}>❌まちがい</div></div>
          <div><div style={{fontSize:32,fontWeight:900,color:T.dunno}}>{dc}</div><div style={{fontSize:11,color:T.textDim}}>🤔わからない</div></div>
          <div><div style={{fontSize:32,fontWeight:900,color:T.pink}}>{fmtTime(avgSec)}</div><div style={{fontSize:11,color:T.textDim}}>⏱平均</div></div>
        </div>
        <div style={{fontSize:13,color:T.textDim,marginBottom:16}}>⏱ 合計 {fmtTime(totalSec)}</div>
        {wc>0&&<div style={{textAlign:"left",background:`${T.wrong}11`,borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${T.wrong}33`}}>
          <p style={{fontWeight:700,fontSize:13,color:T.wrong,marginBottom:6}}>❌ まちがえた問題：</p>
          {results.map((r,i)=>r.result==="wrong"?<div key={i} style={{fontSize:13,color:T.textDim,padding:"3px 0"}}>• Q{i+1}: {qs[i].category}</div>:null)}
        </div>}
        {dc>0&&<div style={{textAlign:"left",background:`${T.dunno}11`,borderRadius:12,padding:14,marginBottom:16,border:`1px solid ${T.dunno}33`}}>
          <p style={{fontWeight:700,fontSize:13,color:T.dunno,marginBottom:6}}>🤔 わからなかった → 暗記カードで復習！</p>
          {results.map((r,i)=>r.result==="dunno"?<div key={i} style={{fontSize:13,color:T.textDim,padding:"3px 0"}}>• Q{i+1}: {qs[i].category}</div>:null)}
        </div>}
        {email ? (
          emailSent
            ? <button onClick={()=>setEmailSent(false)} style={{...btnPrimary,background:`linear-gradient(135deg, ${T.green}, #2E7D32)`,marginBottom:8}}>✅ 送信済み（もう一度送る場合はタップ）</button>
            : <button onClick={sendEmail} style={{...btnPrimary,background:`linear-gradient(135deg, ${T.green}, #2E7D32)`,marginBottom:8}}>📧 結果を保護者に送る</button>
        ) : (
          <div style={{fontSize:12,color:T.textDim,textAlign:"center",marginBottom:8,padding:8}}>⚙️ 設定からメールアドレスを登録すると、結果を自動送信できます</div>
        )}
        <button onClick={()=>{setIdx(0);setResults([]);setShowExp(false);setDone(false);setStreak(0);setEmailSent(false);setSaved(false);}} style={{...btnPrimary,background:`linear-gradient(135deg, ${T.pink}, #C2185B)`}}>もう一度チャレンジ</button>
        <button onClick={onBack} style={{...btnDunno,marginTop:12}}>ホームに戻る</button>
      </div>
    </Wrapper>);
  }

  return (<Wrapper>
    <SlashEffect show={showSlash} streak={streak}/>
    <div ref={topRef}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <button onClick={onBack} style={{background:T.card||T.smoke,border:"none",borderRadius:10,padding:"8px 14px",color:T.textDim,fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>← 戻る</button>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:12,fontWeight:700}}><span style={{color:T.correct}}>⭕{cc}</span> <span style={{color:T.wrong}}>❌{wc}</span> <span style={{color:T.dunno}}>🤔{dc}</span></span>
        <span style={{background:T.card||T.smoke,borderRadius:10,padding:"6px 12px",fontSize:14,fontWeight:700,color:T.pink}}>{idx+1}/{qs.length}</span>
      </div>
    </div>
    <div style={{height:4,borderRadius:2,background:T.card||T.smoke,marginBottom:20,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg, ${T.pink}, ${T.gold})`,width:`${(idx/qs.length)*100}%`,transition:"width 0.4s"}}/>
    </div>
    {streak >= 3 && <div style={{textAlign:"center",fontSize:13,color:T.pink,fontWeight:700,marginBottom:8,fontFamily:"'Zen Maru Gothic',sans-serif"}}>🔥 {streak}連続正解中！</div>}
    <div style={cardBase}>
      <div style={{background:`${T.pink}11`,borderBottom:`2px solid ${T.pink}33`,padding:"10px 20px",display:"flex",alignItems:"center",gap:8}} className="sakura-bg">
        <span style={{background:T.pink,color:T.white,borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>{q.category}</span>
        <span style={{fontSize:12,color:T.textDim,fontWeight:600}}>Q{idx+1}</span>
      </div>
      <div style={{padding:20}}>
        <h2 style={{fontSize:17,fontWeight:700,lineHeight:1.6,color:T.text,margin:"0 0 8px",fontFamily:"'Zen Maru Gothic',sans-serif"}}>{q.question}</h2>
        <div style={{fontSize:13,color:T.dunno,background:`${T.dunno}11`,borderRadius:8,padding:"8px 12px",marginBottom:16,border:`1px solid ${T.dunno}33`}}>💡 {q.hint}</div>
        {q.type==="order"&&<OrderQ q={q} onAnswer={handleAnswer}/>}
        {q.type==="fill_blanks"&&<FillQ q={q} onAnswer={handleAnswer}/>}
        {q.type==="matching"&&<MatchQ q={q} onAnswer={handleAnswer}/>}
        {q.type==="multi_choice"&&<McQ q={q} onAnswer={handleAnswer}/>}
        {q.type==="multi_select"&&<MsQ q={q} onAnswer={handleAnswer}/>}
        {showExp&&(<div style={{marginTop:20,background:lastR==="correct"?`${T.correct}11`:lastR==="dunno"?`${T.dunno}11`:`${T.wrong}11`,borderRadius:14,padding:18,border:`1px solid ${lastR==="correct"?`${T.correct}33`:lastR==="dunno"?`${T.dunno}33`:`${T.wrong}33`}`}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:lastR==="correct"?T.correct:lastR==="dunno"?T.dunno:T.wrong,fontFamily:"'Zen Maru Gothic',sans-serif"}}>
            {lastR==="correct"?"⭕ 正解！":lastR==="dunno"?"🤔 わからなかった → 覚えよう！":"❌ おしい！"}
          </div>
          <p style={{fontSize:14,lineHeight:1.8,color:T.text,whiteSpace:"pre-line",margin:0}}>{q.explanation}</p>
          <FeedbackBox question={q.question} answer={q.explanation} subject={unit.subject} unit={unit.name}/>
        </div>)}
        {showExp&&<button onClick={next} style={{...btnPrimary,marginTop:16}}>{idx+1>=qs.length?"結果を見る →":"次の問題へ →"}</button>}
      </div>
    </div>
  </Wrapper>);
}

// ============================================================
//  FLASHCARD SCREEN
// ============================================================
function FlashScreen({ unit, onBack, email, onSessionSaved }) {
  const [deckIdx, setDeckIdx] = useState(null);
  const [cards, setCards] = useState([]);
  const [ci, setCi] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [res, setRes] = useState({c:0,w:0});
  const [wrongs, setWrongs] = useState([]);
  const [phase, setPhase] = useState("select");
  const [retry, setRetry] = useState(0);
  const [totalCards, setTotalCards] = useState(0);
  const [firstRoundWrongs, setFirstRoundWrongs] = useState([]);
  const [emailSent, setEmailSent] = useState(false);
  const [userInput, setUserInput] = useState("");
  const [judged, setJudged] = useState(null);
  const inputRef = useRef(null);
  const [cardStart, setCardStart] = useState(Date.now());
  const [sessionStart, setSessionStart] = useState(Date.now());
  const [cardTimes, setCardTimes] = useState([]);

  useEffect(() => { if(phase==="play") setTimeout(() => inputRef.current?.focus(), 200); }, [ci, phase]);

  const fmtTime = (sec) => sec < 60 ? `${sec}秒` : `${Math.floor(sec/60)}分${sec%60}秒`;

  const startDeck = (di) => {
    const d = di===-1 ? unit.flashDecks.flatMap(d=>d.cards) : unit.flashDecks[di].cards;
    setCards(shuffle([...d])); setCi(0); setFlipped(false); setRes({c:0,w:0}); setWrongs([]); setRetry(0);
    setTotalCards(d.length); setFirstRoundWrongs([]); setEmailSent(false);
    setCardStart(Date.now()); setSessionStart(Date.now()); setCardTimes([]);
    setDeckIdx(di); setPhase("play");
  };

  const handleRes = (knew) => {
    const sec = Math.round((Date.now()-cardStart)/1000);
    if (retry===0) setCardTimes(p=>[...p,sec]);
    if(knew) setRes(p=>({...p,c:p.c+1}));
    else {
      setRes(p=>({...p,w:p.w+1}));
      setWrongs(p=>[...p,cards[ci]]);
      if(retry===0) setFirstRoundWrongs(p=>[...p,cards[ci]]);
    }
    if(ci+1>=cards.length) {
      if(!knew && wrongs.length===0) { const lastCard=cards[ci]; setTimeout(()=>{setCards(shuffle([lastCard]));setCi(0);setFlipped(false);setRes({c:0,w:0});setWrongs([]);setRetry(r=>r+1);setPhase("play");setCardStart(Date.now());},300); }
      else { const finalW = knew ? [...wrongs] : [...wrongs,cards[ci]]; if(!knew&&retry===0) setFirstRoundWrongs(p=>[...p,cards[ci]]); if(finalW.length>0){setTimeout(()=>{setCards(shuffle(finalW));setCi(0);setFlipped(false);setRes({c:0,w:0});setWrongs([]);setRetry(r=>r+1);setPhase("play");setCardStart(Date.now());},300);} else setPhase("done"); }
    } else { setCi(i=>i+1); setFlipped(false); setCardStart(Date.now()); }
  };

  const firstCorrect = totalCards - firstRoundWrongs.length;
  const totalSec = cardTimes.reduce((s,t)=>s+t,0);
  const avgSec = cardTimes.length>0?Math.round(totalSec/cardTimes.length):0;

  useEffect(() => {
    if (phase === "done") {
      const dn = deckIdx===-1 ? "全問" : (unit.flashDecks[deckIdx]?.name || "");
      saveSession({
        ts: new Date().toISOString(), mode: "flash",
        subject: unit.subject, unit: unit.name + "（" + dn + "）",
        correct: firstCorrect, wrong: firstRoundWrongs.length, dunno: 0,
        total: totalCards, title: "", retry: retry, totalSec, avgSec,
      }).then(() => { if (onSessionSaved) onSessionSaved(); });
      saveClear(unit.id, "flash", firstCorrect, totalCards);
    }
  }, [phase]);

  const deckName = deckIdx===-1 ? "全問チャレンジ" : unit.flashDecks[deckIdx]?.name || "";

  const sendFlashEmail = () => {
    if (!email) return;
    const wrongList = firstRoundWrongs.map(c=>`  ・${c.q} → ${c.a}`).join("\n");
    const body = `📅 ${new Date().toLocaleDateString("ja-JP")}\n📚 ${unit.subject} ＞ ${unit.name}\n🧠 モード: 暗記カード（${deckName}）\n\n😊 1回目で覚えてた: ${firstCorrect}問 / ${totalCards}問\n😅 わからなかった: ${firstRoundWrongs.length}問\n🔄 リトライ回数: ${retry}回\n⏱ 合計: ${fmtTime(totalSec)} / 平均: ${fmtTime(avgSec)}/1問\n\n${firstRoundWrongs.length>0?`😅 わからなかったカード:\n${wrongList}\n`:"🎉 1回目で全問正解！"}\n`;
    const subj = encodeURIComponent(`[ゆいか学習] 🧠暗記 ${unit.subject}・${unit.name}（${deckName}）`);
    window.open(`mailto:${encodeURIComponent(email)}?subject=${subj}&body=${encodeURIComponent(body)}`);
    setEmailSent(true);
  };

  if (phase==="select") return (
    <Wrapper>
      <button onClick={onBack} style={{background:T.card||T.smoke,border:"none",borderRadius:10,padding:"8px 14px",color:T.textDim,fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",marginBottom:20}}>← 戻る</button>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:42,marginBottom:4}}>🧠</div>
        <h2 style={{fontSize:22,fontWeight:900,color:T.text,fontFamily:"'Zen Maru Gothic',sans-serif",margin:"0 0 4px"}}>暗記トレーニング</h2>
        <p style={{fontSize:13,color:T.textDim,margin:0}}>{unit.name}</p>
      </div>
      <button onClick={()=>startDeck(-1)} style={{...btnPrimary,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <span style={{fontSize:20}}>🔥</span> 全{unit.flashDecks.reduce((s,d)=>s+d.cards.length,0)}問チャレンジ
      </button>
      <p style={{fontSize:12,color:T.textMuted,textAlign:"center",marginBottom:12}}>または分野を選ぶ</p>
      {unit.flashDecks.map((d,i)=>(
        <button key={i} onClick={()=>startDeck(i)} style={{width:"100%",padding:"14px 18px",borderRadius:14,marginBottom:8,border:`1px solid ${T.textMuted}`,background:T.card||T.smoke,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
          <span style={{fontSize:26,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",background:`${d.color}22`,borderRadius:12}}>{d.icon}</span>
          <div><div style={{fontSize:15,fontWeight:700,color:T.text}}>{d.name}</div><div style={{fontSize:12,color:T.textDim,marginTop:2}}>{d.cards.length}問</div></div>
          <span style={{marginLeft:"auto",color:T.textMuted,fontSize:18}}>→</span>
        </button>
      ))}
    </Wrapper>
  );

  if (phase==="done") return (
    <Wrapper>
      <div style={{...cardBase,textAlign:"center",padding:"40px 20px",marginTop:30}} className="sakura-bg">
        <div style={{fontSize:64,marginBottom:12}}>🎊</div>
        <h2 style={{fontSize:24,fontWeight:900,color:T.gold,fontFamily:"'Zen Maru Gothic',sans-serif",textShadow:`0 0 20px ${T.gold}44`}}>全集中・暗記完了！</h2>
        {retry>0&&<p style={{fontSize:14,color:T.textDim,margin:"8px 0"}}>リトライ {retry}回で完全制覇</p>}
        <div style={{display:"flex",justifyContent:"center",gap:16,margin:"20px 0"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:T.correct}}>{firstCorrect}</div><div style={{fontSize:11,color:T.textDim}}>1回目で正解</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:T.wrong}}>{firstRoundWrongs.length}</div><div style={{fontSize:11,color:T.textDim}}>リトライした</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:T.text}}>{totalCards}</div><div style={{fontSize:11,color:T.textDim}}>全カード数</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:900,color:T.pink}}>{fmtTime(avgSec)}</div><div style={{fontSize:11,color:T.textDim}}>⏱平均</div></div>
        </div>
        <div style={{fontSize:13,color:T.textDim,marginBottom:16}}>⏱ 合計 {fmtTime(totalSec)}</div>
        {firstRoundWrongs.length>0&&<div style={{textAlign:"left",background:`${T.wrong}11`,borderRadius:12,padding:14,marginBottom:16,border:`1px solid ${T.wrong}33`}}>
          <p style={{fontWeight:700,fontSize:13,color:T.wrong,marginBottom:6}}>😅 1回目でわからなかったカード：</p>
          {firstRoundWrongs.map((c,i)=><div key={i} style={{fontSize:13,color:T.textDim,padding:"3px 0"}}>• {c.q} → <span style={{color:T.dunno}}>{c.a}</span></div>)}
        </div>}
        {email ? (
          emailSent
            ? <button onClick={()=>setEmailSent(false)} style={{...btnPrimary,background:`linear-gradient(135deg, ${T.green}, #2E7D32)`,marginBottom:8}}>✅ 送信済み（もう一度送る場合はタップ）</button>
            : <button onClick={sendFlashEmail} style={{...btnPrimary,background:`linear-gradient(135deg, ${T.green}, #2E7D32)`,marginBottom:8}}>📧 結果を保護者に送る</button>
        ) : (
          <div style={{fontSize:12,color:T.textDim,textAlign:"center",marginBottom:8,padding:8}}>⚙️ 設定からメールアドレスを登録すると結果を送信できます</div>
        )}
        <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:8}}>
          <button onClick={onBack} style={{padding:"14px 28px",borderRadius:12,border:`1px solid ${T.textMuted}`,background:"transparent",color:T.text,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Zen Maru Gothic',sans-serif"}}>戻る</button>
          <button onClick={()=>startDeck(deckIdx)} style={{padding:"14px 28px",borderRadius:12,border:"none",background:T.pink,color:T.white,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Zen Maru Gothic',sans-serif"}}>もう1回</button>
        </div>
      </div>
    </Wrapper>
  );

  const card = cards[ci];

  // Normalize for flexible matching: lowercase, trim, remove spaces/punctuation, convert katakana to hiragana
  const normalize = (s) => {
    return s.toLowerCase().trim()
      .replace(/[\s　・、。（）()「」\-\/]/g, "")
      .replace(/[ァ-ヶ]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)) // katakana→hiragana
      .replace(/[０-９]/g, m => String.fromCharCode(m.charCodeAt(0) - 0xFEE0)) // fullwidth→ascii
      .replace(/[Ａ-Ｚａ-ｚ]/g, m => String.fromCharCode(m.charCodeAt(0) - 0xFEE0));
  };

  // Check if user answer matches (partial match for long answers, supports alt answers)
  const checkAnswer = (input, answer, alts) => {
    const ni = normalize(input);
    const na = normalize(answer);
    if (!ni) return false;
    if (ni === na) return true;
    if (na.includes(ni) && ni.length >= 2) return true;
    if (ni.includes(na)) return true;
    const parts = answer.split(/[／\/、。（）()・\n]/).map(normalize).filter(p => p.length > 0);
    if (parts.some(p => p === ni || ni.includes(p) || p.includes(ni))) return true;
    if (alts && alts.some(a => { const nalt = normalize(a); return ni === nalt || nalt.includes(ni) || ni.includes(nalt); })) return true;
    return false;
  };

  const handleSubmitAnswer = () => {
    if (judged || !userInput.trim()) return;
    const isCorrect = checkAnswer(userInput, card.a, card.alt);
    setJudged(isCorrect ? "correct" : "wrong");
  };

  const handleNext = () => {
    const knew = judged === "correct";
    handleRes(knew);
    setUserInput("");
    setJudged(null);
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  return (<Wrapper>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <button onClick={()=>setPhase("select")} style={{background:T.card||T.smoke,border:"none",borderRadius:10,padding:"8px 14px",color:T.textDim,fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>← 戻る</button>
      <span style={{background:T.card||T.smoke,borderRadius:10,padding:"6px 12px",fontSize:14,fontWeight:700,color:T.text}}>{ci+1}/{cards.length}</span>
    </div>
    {retry>0&&<div style={{textAlign:"center",marginBottom:8}}><span style={{background:T.wrong,color:T.white,borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700}}>リトライ {retry}</span></div>}
    <div style={{display:"flex",justifyContent:"center",gap:20,marginBottom:16}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.correct}}>{res.c}</div><div style={{fontSize:11,color:T.textDim}}>正解</div></div>
      <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.wrong}}>{res.w}</div><div style={{fontSize:11,color:T.textDim}}>不正解</div></div>
    </div>
    {/* Question card */}
    <div style={{
      borderRadius:24,padding:"32px 24px",textAlign:"center",
      position:"relative",overflow:"hidden",
      background:`linear-gradient(145deg, rgba(232,72,135,0.04), rgba(255,255,255,0.8))`,
      border:`1px solid ${judged==="correct"?`${T.correct}66`:judged==="wrong"?`${T.wrong}66`:T.textMuted}`,
      boxShadow:judged?`0 8px 40px ${judged==="correct"?T.correct:T.wrong}22`:`0 4px 20px rgba(232,72,135,0.08)`,
      transition:"all 0.3s",
    }} className="sakura-bg">
      <div style={{fontSize:13,color:T.textMuted,marginBottom:16,fontWeight:700}}>問題</div>
      <div style={{fontSize:20,fontWeight:700,color:T.text,lineHeight:1.7,fontFamily:"'Zen Maru Gothic',sans-serif",marginBottom:24}}>{card.q}</div>

      {/* Input area */}
      {!judged && (
        <div>
          <input
            ref={inputRef}
            type="text"
            value={userInput}
            onChange={e=>setUserInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") handleSubmitAnswer(); }}
            placeholder="答えを入力…"
            style={{
              width:"100%",padding:"14px 16px",borderRadius:12,
              border:`2px solid ${T.textMuted}`,background:"rgba(232,72,135,0.03)",
              color:T.text,fontSize:18,fontFamily:"'Noto Sans JP',sans-serif",
              textAlign:"center",outline:"none",boxSizing:"border-box",
            }}
            onFocus={e=>{e.target.style.borderColor=T.pink;}}
            onBlur={e=>{e.target.style.borderColor=T.textMuted;}}
          />
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={handleSubmitAnswer}
              disabled={!userInput.trim()}
              style={{...btnPrimary,flex:1,opacity:userInput.trim()?1:0.5}}>
              答え合わせ
            </button>
            <button onClick={()=>{setJudged("wrong");setUserInput("");}}
              style={{...btnDunno,flex:1,marginTop:8}}>
              🤔 わからない
            </button>
          </div>
        </div>
      )}

      {/* Result */}
      {judged && (
        <div style={{animation:"fadeIn 0.3s ease"}}>
          <div style={{
            padding:"16px",borderRadius:14,marginBottom:12,
            background:judged==="correct"?`${T.correct}15`:`${T.wrong}15`,
            border:`1px solid ${judged==="correct"?`${T.correct}44`:`${T.wrong}44`}`,
          }}>
            <div style={{fontSize:18,fontWeight:900,color:judged==="correct"?T.correct:T.wrong,marginBottom:8,fontFamily:"'Zen Maru Gothic',sans-serif"}}>
              {judged==="correct"?"⭕ 正解！":"❌ 不正解"}
            </div>
            {judged==="wrong"&&userInput&&(
              <div style={{fontSize:13,color:T.textDim,marginBottom:8}}>
                あなたの答え: <span style={{color:T.wrong,textDecoration:"line-through"}}>{userInput}</span>
              </div>
            )}
            <div style={{fontSize:13,color:T.textDim}}>正解:</div>
            <div style={{fontSize:22,fontWeight:900,color:T.text,marginTop:4,fontFamily:"'Zen Maru Gothic',sans-serif"}}>{card.a}</div>
          </div>
          <FeedbackBox question={card.q} answer={card.a} subject={unit.subject} unit={unit.name}/>
          <button onClick={handleNext} style={{...btnPrimary,marginTop:4}}>
            {ci+1>=cards.length?"結果を見る →":"次のカード →"}
          </button>
        </div>
      )}
    </div>
    {!judged&&<p style={{textAlign:"center",fontSize:12,color:T.textMuted,marginTop:12}}>※ ひらがな・カタカナどちらでもOK</p>}
  </Wrapper>);
}

    if (!c) return null;
    if (c.rate >= 1) return {icon:"💖",label:"恋柱",color:T.gold};
    if (c.rate >= 0.8) return {icon:"🌸",label:"甲",color:T.pink};
    if (c.rate >= 0.6) return {icon:"🎀",label:"丙",color:T.pinkPale};

// ============================================================
//  HISTORY SCREEN
// ============================================================
function HistoryScreen({ onBack }) {
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    loadSessions().then(s => { setSessions(s); setLoading(false); });
  }, []);

  const stats = calcStats(sessions);

  // Build chart data: last 10 sessions grouped
  const recentQuiz = sessions.filter(s=>s.mode==="quiz").slice(0, 10).reverse();
  const recentFlash = sessions.filter(s=>s.mode==="flash").slice(0, 10).reverse();

  // Sparkline SVG helper
  const sparkline = (data, color, maxPts) => {
    if (!data.length) return null;
    const pts = data.slice(-maxPts);
    const w = 300, h = 80, px = w / Math.max(pts.length - 1, 1);
    const points = pts.map((v, i) => `${i * px},${h - v * h / 100}`).join(" ");
    return (
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:h}}>
        <line x1="0" y1={h/2} x2={w} y2={h/2} stroke="rgba(232,72,135,0.04)" strokeDasharray="4"/>
        <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.length > 0 && <circle cx={(pts.length-1)*px} cy={h - pts[pts.length-1]*h/100} r="4" fill={color}/>}
      </svg>
    );
  };

  const quizRates = recentQuiz.map(s => s.total > 0 ? Math.round(s.correct/s.total*100) : 0);
  const dunnoRates = sessions.filter(s=>s.mode==="quiz").slice(0,10).reverse().map(s => s.total > 0 ? Math.round((s.dunno||0)/s.total*100) : 0);

  const formatDate = (ts) => {
    const d = new Date(ts);
    const days = ["日","月","火","水","木","金","土"];
    return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  const titleIcons = {"恋柱":"💖","甲":"🌸","丙":"🎀","修行中":"📖"};
  const titleColors = {"恋柱":T.gold,"甲":T.pink,"丙":T.text,"修行中":T.textDim};

  if (loading) return (<Wrapper><div style={{textAlign:"center",paddingTop:80}}><p style={{color:T.textDim}}>読み込み中…</p></div></Wrapper>);

  return (
    <Wrapper>
      <button onClick={onBack} style={{background:T.card||T.smoke,border:"none",borderRadius:10,padding:"8px 14px",color:T.textDim,fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",marginBottom:20}}>← ホーム</button>

      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:11,color:T.textMuted,letterSpacing:3,marginBottom:4}}>学 習 き ろ く</div>
        <div style={{fontSize:20,fontWeight:900,color:T.text,fontFamily:"'Zen Maru Gothic',sans-serif"}}>ゆいかの成績</div>
      </div>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
        <div style={{background:T.card||T.smoke,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,color:T.gold}}>{stats.streak}</div>
          <div style={{fontSize:11,color:T.textMuted}}>連続学習日</div>
        </div>
        <div style={{background:T.card||T.smoke,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,color:T.correct}}>{stats.avgRate}%</div>
          <div style={{fontSize:11,color:T.textMuted}}>平均正答率</div>
        </div>
        <div style={{background:T.card||T.smoke,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,color:titleColors[stats.bestTitle]||T.text}}>{stats.bestTitle}</div>
          <div style={{fontSize:11,color:T.textMuted}}>最高称号</div>
        </div>
      </div>

      {/* Accuracy graph */}
      {quizRates.length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.textDim}}>正答率の推移（クイズ）</div>
          <div style={{background:T.card||T.smoke,borderRadius:12,padding:14,border:`1px solid rgba(232,72,135,0.04)`}}>
            {sparkline(quizRates, T.pink, 10)}
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textMuted,marginTop:4}}>
              <span>過去</span>
              <span>最新 {quizRates[quizRates.length-1]}%</span>
            </div>
          </div>
        </div>
      )}

      {/* Dunno rate graph */}
      {dunnoRates.length > 0 && dunnoRates.some(v=>v>0) && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.textDim}}>「わからない」率の推移</div>
          <div style={{background:T.card||T.smoke,borderRadius:12,padding:14,border:`1px solid rgba(232,72,135,0.04)`}}>
            {sparkline(dunnoRates, T.dunno, 10)}
            <div style={{fontSize:10,color:T.dunno,textAlign:"right",marginTop:4}}>
              {dunnoRates.length>=2 && dunnoRates[dunnoRates.length-1] <= dunnoRates[0] ? "↓ 減少中 = 暗記が定着してきた" : ""}
            </div>
          </div>
        </div>
      )}

      {/* Session list */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.textDim}}>最近のセッション</div>
        {sessions.length === 0 && <p style={{fontSize:13,color:T.textMuted,textAlign:"center",padding:20}}>まだ学習記録がありません。クイズや暗記カードに挑戦しよう！</p>}
        {sessions.slice(0, 20).map((s, i) => (
          <div key={i} style={{background:T.card||T.smoke,borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid rgba(232,72,135,0.04)`,display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:20}}>{s.mode==="quiz"?"⚔️":"🧠"}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>{s.subject}・{s.unit}</div>
              <div style={{fontSize:11,color:T.textMuted}}>{formatDate(s.ts)}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {s.mode==="quiz" && s.title ? (
                <>
                  <div style={{fontSize:15,fontWeight:900,color:titleColors[s.title]||T.text}}>{s.title}</div>
                  <div style={{fontSize:11,color:T.textMuted}}>{s.correct}/{s.total}{s.avgSec?` ⏱${s.avgSec}秒`:""}</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:14,fontWeight:700,color:s.correct===s.total?T.correct:T.dunno}}>{s.correct}/{s.total}</div>
                  <div style={{fontSize:11,color:T.textMuted}}>{s.retry > 0 ? `リトライ${s.retry}回` : ""}{s.avgSec?` ⏱${s.avgSec}秒`:""}</div>
                </>
              )}
            </div>
          </div>
        ))}
      </div>
    </Wrapper>
  );
}

// ============================================================
//  APP ROOT
// ============================================================
function App() {
  const [activeUnit, setActiveUnit] = useState(null);
  const [screen, setScreen] = useState("home"); // home | settings | history
  const [email, setEmail] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [sessionVer, setSessionVer] = useState(0);

  const handleSessionSaved = () => setSessionVer(v => v + 1);

  useEffect(() => {
    injectStyles();
    (async () => {
      try {
        const result = await window.storage.get("parent-email");
        if (result && result.value) setEmail(result.value);
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  if (!loaded) return (
    <Wrapper>
      <div style={{textAlign:"center",paddingTop:100}}>
        <div style={{fontSize:36,marginBottom:12}}>⏳</div>
        <p style={{color:T.textDim,fontFamily:"'Zen Maru Gothic',sans-serif"}}>読み込み中…</p>
      </div>
    </Wrapper>
  );

  if (screen === "settings") {
    return <SettingsScreen email={email} onSave={setEmail} onBack={() => setScreen("home")} />;
  }

  if (screen === "history") {
    return <HistoryScreen onBack={() => setScreen("home")} key={sessionVer} />;
  }

  if (activeUnit) {
    return <UnitScreen unit={activeUnit} onBack={() => setActiveUnit(null)} email={email} onSessionSaved={handleSessionSaved} />;
  }

  return <HomeScreen onSelectUnit={setActiveUnit} onSettings={() => setScreen("settings")} onHistory={() => setScreen("history")} email={email} />;
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
